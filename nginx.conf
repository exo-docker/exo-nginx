
user  nginx;
worker_processes  1;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;


events {
    worker_connections  1024;
}


http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    #tcp_nopush     on;

    keepalive_timeout  65;

    #gzip  on;

    # Post-Quantum Cryptography (PQC) notes:
    # This image ships OpenSSL with the OQS provider for PQC algorithms.
    # To enable PQC key exchange and signatures in your SSL config:
    #
    #   ssl_ecdh_curves X25519:MLKEM768:X25519MLKEM768;
    #   ssl_conf_command SignatureAlgorithms MLDSA65:RSA:ECDSA;
    #
    # Available groups (KEM): MLKEM512, MLKEM768, MLKEM1024,
    #   X25519MLKEM768, X448MLKEM1024, X25519KYBER768DRAFT00
    # Available sigalg: MLDSA44, MLDSA65, MLDSA87, FALCON512, FALCON1024,
    #   SPHINCS_PLUS_SHA2_128F, SPHINCS_PLUS_SHA2_128S
    # See oqs-provider docs for the full list.

    include /etc/nginx/conf.d/*.conf;
}

